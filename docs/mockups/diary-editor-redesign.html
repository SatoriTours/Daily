<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Satori 日记编辑设计稿</title>
  <style>
    :root {
      --bg: #eef2ef;
      --scrim: rgba(23, 31, 28, 0.36);
      --surface: #fffdf8;
      --text: #1b1f1c;
      --muted: #6f7972;
      --line: #e3e8e2;
      --chip: #f1f5ef;
      --primary: #2f7d5a;
      --primary-soft: #dceee3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #dfe7e1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .phone {
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      background: var(--bg);
      border-radius: 34px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 70px rgba(25, 38, 31, 0.26);
    }

    .screen-bg {
      position: absolute;
      inset: 0;
      padding: 58px 22px;
      color: rgba(27, 31, 28, 0.32);
      font-size: 14px;
      line-height: 1.7;
    }

    .scrim {
      position: absolute;
      inset: 0;
      background: var(--scrim);
    }

    .sheet {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      height: 92%;
      background: var(--surface);
      border-radius: 22px 22px 18px 18px;
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 42px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      font-size: 15px;
    }

    .header button {
      border: 0;
      background: transparent;
      color: var(--primary);
      font: inherit;
      padding: 8px 0;
    }

    .header button:last-child {
      justify-self: end;
      font-weight: 650;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0;
    }

    .meta-row {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .meta-left,
    .mood {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .mood {
      color: var(--primary);
      background: var(--primary-soft);
      padding: 5px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      overflow: hidden;
      padding: 12px 0 8px;
    }

    .chip {
      height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .chip.add {
      background: transparent;
      border: 1px dashed #b7c5ba;
      color: var(--primary);
      font-weight: 600;
    }

    .editor {
      flex: 1;
      padding: 12px 0;
      color: #a1aaa4;
      font-size: 16px;
      line-height: 1.8;
    }

    .sample-text {
      color: var(--text);
      margin-top: 22px;
      max-width: 92%;
    }

    .toolbar {
      height: 48px;
      border-radius: 999px;
      background: #f4f7f2;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      color: var(--muted);
      border: 1px solid rgba(40, 70, 54, 0.05);
    }

    .tool {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .tool.primary {
      color: var(--primary);
      background: rgba(47, 125, 90, 0.08);
    }

    .caption {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #405047;
    }
  </style>
</head>
<body>
  <div class="caption">新建日记弹窗设计稿：时间/标签归入元信息区，正文保持干净</div>
  <main class="phone" aria-label="日记编辑设计稿">
    <div class="screen-bg">
      我的日记<br>
      今天记录了几件小事。晚上散步的时候，风比白天轻一些。
    </div>
    <div class="scrim"></div>
    <section class="sheet">
      <div class="header">
        <button>取消</button>
        <div class="title">新建日记</div>
        <button>保存</button>
      </div>

      <div class="meta-row">
        <div class="meta-left">📅 6月19日 19:42</div>
        <div class="mood">平静</div>
      </div>

      <div class="tag-row">
        <div class="chip add">+ 标签</div>
        <div class="chip">#生活</div>
        <div class="chip">#散步</div>
      </div>

      <div class="editor">
        写点东西...
        <div class="sample-text">
          晚饭后走了一圈，路边的树影很安静。今天想把节奏放慢一点。
        </div>
      </div>

      <div class="toolbar">
        <div class="tool primary">□</div>
        <div class="tool">T</div>
        <div class="tool">1.</div>
        <div class="tool">•</div>
        <div class="tool">#</div>
        <div class="tool">☺</div>
        <div class="tool">↶</div>
        <div class="tool">↷</div>
        <div class="tool primary">⌃</div>
      </div>
    </section>
  </main>
</body>
</html>
